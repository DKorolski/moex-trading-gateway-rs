name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Forbidden surface scan
        run: bash scripts/forbidden_surface_scan.sh

      - name: Forbidden surface negative harness
        run: bash scripts/forbidden_surface_negative_harness.sh
        timeout-minutes: 75

      - name: Stage 5D additive freeze negative harness
        run: python3 scripts/stage5d_additive_freeze_negative_harness.py
        timeout-minutes: 5

      - name: No-Redis evidence smoke
        run: bash scripts/test_m4_3x_evidence_no_redis.sh

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo test
        run: cargo test --all

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  redis-smoke:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Redis shadow smoke
        run: scripts/redis_shadow_smoke.sh

      - name: Runtime bridge dry smoke
        run: scripts/runtime_bridge_dry_smoke.sh
